name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Blocking gate ──────────────────────────────────────────────────────────
  # Required status check. Must pass before any PR can merge.
  fast-gate:
    name: Type-check + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: ./node_modules/.bin/tsc

      - name: Unit tests
        run: npm test

      - name: Build frontend
        run: npm run build

  # ── Rust blocking gate ─────────────────────────────────────────────────────
  # Required status check for Tauri/Rust regressions.
  rust-gate:
    name: Rust check + tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate CI tauri config
        run: node scripts/generate-tauri-variant-config.mjs --variant ci --out src-tauri/tauri.conf.json

      - name: Rust format check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Rust check
        run: cargo check --manifest-path src-tauri/Cargo.toml --locked

      - name: Rust tests lib
        run: cargo test --manifest-path src-tauri/Cargo.toml --locked --lib

      - name: Rust tests bins
        run: cargo test --manifest-path src-tauri/Cargo.toml --locked --bins
