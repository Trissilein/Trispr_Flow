name: Windows Release Installers

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      variants:
        description: "Space-separated variant list (vulkan cuda-lite cuda-complete)"
        required: false
        default: "vulkan cuda-lite cuda-complete"
      upload_to_release:
        description: "Upload installers to GitHub Release (requires tag ref)"
        required: false
        default: true
        type: boolean

jobs:
  build:
    runs-on: windows-latest
    env:
      VARIANTS: ${{ github.event_name == 'workflow_dispatch' && inputs.variants || 'vulkan cuda-lite cuda-complete' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install NPM dependencies
        run: npm ci

      - name: Hydrate Whisper runtime from published release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: .\scripts\hydrate-whisper-runtime-from-release.ps1 -SkipTag '${{ github.ref_name }}'

      - name: Validate hydrated runtime
        run: node scripts/validate-whisper-runtime.mjs --variant cuda-complete

      - name: Build installer variants
        shell: cmd
        run: scripts\windows\build-installers.bat %VARIANTS%

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ github.run_id }}
          path: installers/*.exe
          if-no-files-found: error

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') && (github.event_name == 'push' || inputs.upload_to_release)
        uses: softprops/action-gh-release@v2
        with:
          files: installers/*.exe
